<style>
    .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24;
    }
    .glass-panel {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(10px);
    }
    .text-kern-wide {
        letter-spacing: 0.3em;
    }
    .text-kern-ultra {
        letter-spacing: 0.6em;
    }
    [x-cloak] { display: none !important; }

    /* Master Dropdown Styles */
    .nav-item {
        position: relative;
    }

    .dropdown-menu {
        position: absolute;
        top: calc(100% + 16px);
        left: 50%;
        transform: translateX(-50%);
        min-width: 220px;
        background: rgba(10, 10, 10, 0.97);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        padding: 8px 0;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.2s ease, visibility 0.2s ease, transform 0.2s ease;
        transform: translateX(-50%) translateY(-6px);
        z-index: 100;
    }

    .nav-item:hover .dropdown-menu,
    .nav-item:focus-within .dropdown-menu {
        opacity: 1;
        visibility: visible;
        transform: translateX(-50%) translateY(0);
    }

    .dropdown-menu::before {
        content: '';
        position: absolute;
        top: -5px;
        left: 50%;
        transform: translateX(-50%);
        width: 10px;
        height: 10px;
        background: rgba(10, 10, 10, 0.97);
        border-left: 1px solid rgba(255,255,255,0.08);
        border-top: 1px solid rgba(255,255,255,0.08);
        transform: translateX(-50%) rotate(45deg);
    }

    .dropdown-menu a {
        display: block;
        padding: 10px 20px;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(148, 163, 184, 0.8);
        transition: color 0.2s, background 0.2s;
        white-space: nowrap;
    }

    .dropdown-menu a:hover {
        color: #e6e6e6;
        background: rgba(255, 255, 255, 0.04);
    }

</style>

    <!-- Global Filter Tabs -->

                    :class="activeTab === project.id ? 'bg-primary text-background' : 'border border-white/10 text-neutral-500 hover:text-white'">
                </button>
            </template>
        </div>
    </section>

    <!-- Tab Contents -->

        <div x-show="activeTab === project.id" x-cloak>
            
            <!-- Hero Section -->

                        <p class="text-on-surface-variant font-light leading-relaxed mb-8 max-w-md" x-text="project.blocks[0].desc"></p>
